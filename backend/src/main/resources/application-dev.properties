# Development Environment Configuration
# This file is used when running with: java -jar app.jar --spring.profiles.active=dev
# Or automatically when running from IDE in development mode

spring.application.name=Spring_data_JPA
spring.datasource.url=jdbc:mysql://localhost:3306/farmchainx
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

google.oauth.client-id=

# Email verification delivery
app.auth.show-email-code-response=false
app.email.enabled=true
app.email.from=noreply@farmchainx.com

# SMTP Configuration for Development
# Use actual Gmail or fallback email service credentials here
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply@farmchainx.com
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

