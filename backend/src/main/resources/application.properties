spring.application.name=Spring_data_JPA
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/farmchainx}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

google.oauth.client-id=${GOOGLE_CLIENT_ID:}

# Email verification delivery
app.auth.show-email-code-response=${SHOW_EMAIL_CODE_RESPONSE:false}
app.email.enabled=${EMAIL_ENABLED:true}
app.email.from=${MAIL_FROM:noreply@farmchainx.com}

# SMTP
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@farmchainx.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
